server:
  port: 8081
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.100.128:3307/hmdp?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: '000000'
  redis:
    host: 192.168.100.128
    port: 6379
    password: '000000'
    lettuce:
      pool:
        max-active: 50
        max-idle: 50
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
  rabbitmq:
    host: 192.168.100.128       # RabbitMQ 服务器地址，本地装改为 127.0.0.1
    port: 5672                  # AMQP 默认端口（15672 是管理后台 HTTP 端口）
    username: guest             # 默认账号（生产环境必须改）
    password: guest
    virtual-host: /
    publisher-confirm-type: correlated   # 开启生产者 Confirm 回调（消息是否到达 Exchange）
    publisher-returns: true              # 开启 Return 回调（消息是否路由到 Queue）
    listener:
      simple:
        acknowledge-mode: manual    # 手动 ACK，保证消息可靠消费
        prefetch: 20                  # 每次只从队列取 20 条
        concurrency: 5                # 并发消费 5 个线程
        max-concurrency: 10           # 最大并发消费 10 个线程
        retry:
          enabled: false             # 关闭 Spring 内置重试，补偿逻辑由定时任务接管（指数退避 + 死信升级）
redisson:
  address: redis://192.168.100.128:6379
  password: '000000'
  database: 0
mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug
    top.javatool.canal.client: warn   # 关闭 canal 内部日志刷屏
hmdp:
  upload:
    image-dir: E:/Code/Project/Campus-Store-Area/uploads/imgs/

canal:
  destination: example
  server: 192.168.100.128:11111

